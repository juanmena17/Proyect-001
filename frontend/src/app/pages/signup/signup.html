<main class="signup-shell">
  <section class="signup-panel" aria-labelledby="signup-title">
    <h1 id="signup-title">Sign up</h1>

    <form class="signup-form" (ngSubmit)="submitSignup()">
      <input
        type="email"
        name="email"
        placeholder="Email address"
        aria-label="Email address"
        [(ngModel)]="email"
      />
      <input
        type="text"
        name="user"
        placeholder="Username"
        aria-label="Username"
        [(ngModel)]="user"
      />

      <div class="password-field">
        <input
          name="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Password"
          aria-label="Password"
          [(ngModel)]="password"
        />
        <button
          type="button"
          class="password-toggle"
          [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          (click)="togglePassword()"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.1 12s3.4-6 9.9-6 9.9 6 9.9 6-3.4 6-9.9 6-9.9-6-9.9-6Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>

      <div class="password-field">
        <input
          name="repeatPassword"
          [type]="showRepeatPassword ? 'text' : 'password'"
          placeholder="Repeat Password"
          aria-label="Repeat Password"
          [(ngModel)]="repeatPassword"
        />
        <button
          type="button"
          class="password-toggle"
          [attr.aria-label]="showRepeatPassword ? 'Hide repeated password' : 'Show repeated password'"
          (click)="toggleRepeatPassword()"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.1 12s3.4-6 9.9-6 9.9 6 9.9 6-3.4 6-9.9 6-9.9-6-9.9-6Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>

      @if (submitted && !hasValidPassword) {
        <p class="form-message">La contraseña no cumple los requisitos.</p>
      }
      @if (submitted && hasValidPassword && !passwordsMatch) {
        <p class="form-message">Las contraseñas no coinciden.</p>
      }
      @if (statusMessage) {
        <p class="form-message">{{ statusMessage }}</p>
      }

      <button type="submit" class="signup-action" [disabled]="!canSubmit">
        <span aria-hidden="true">✓</span>
        SIGN UP
      </button>
    </form>
  </section>
</main>
